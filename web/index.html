<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Host</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2310a37f'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='18' fill='white'>M</text></svg>">

    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <!-- Syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark-dimmed.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/highlight.min.js"></script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:          #212121;
            --sidebar-bg:  #171717;
            --surface:     #2f2f2f;
            --surface-2:   #3d3d3d;
            --border:      #404040;
            --text:        #ececec;
            --text-muted:  #8e8e8e;
            --accent:      #10a37f;
            --accent-hover:#0d8f6f;
            --user-bg:     #2f2f2f;
            --error-bg:    #4a1c1c;
            --error-border:#7f1d1d;
            --code-bg:     #1e1e1e;
            --radius:      12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            font-size: 15px;
            line-height: 1.6;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 0.75rem; }

        .logo {
            width: 28px; height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: #fff;
        }

        header h1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        .status {
            display: flex;
            gap: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
        }
        .status-dot.connected { background: #4ade80; }

        /* ── Tools bar ── */
        .tools-bar {
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tools-bar::-webkit-scrollbar { display: none; }

        .tools-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tool-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            cursor: default;
            transition: color 0.15s, border-color 0.15s;
        }
        .tool-chip:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }

        /* ── Messages ── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 0;
            scroll-behavior: smooth;
        }
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .message-row {
            display: flex;
            padding: 0.75rem 1.5rem;
            gap: 1rem;
            max-width: 860px;
            margin: 0 auto;
            width: 100%;
        }
        .message-row:hover { background: rgba(255,255,255,0.02); }

        .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .avatar.user   { background: #5c6bc0; color: #fff; }
        .avatar.assistant { background: var(--accent); color: #fff; }
        .avatar.error  { background: var(--error-bg); color: #f87171; }

        .message-body { flex: 1; min-width: 0; }

        .message-meta {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
        }

        .message-content {
            color: var(--text);
            line-height: 1.7;
            word-break: break-word;
        }

        /* Markdown styles inside assistant messages */
        .message-content p { margin-bottom: 0.75rem; }
        .message-content p:last-child { margin-bottom: 0; }

        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4 {
            margin: 1rem 0 0.5rem;
            font-weight: 600;
            line-height: 1.3;
        }
        .message-content h1 { font-size: 1.3em; }
        .message-content h2 { font-size: 1.15em; }
        .message-content h3 { font-size: 1.05em; }

        .message-content ul,
        .message-content ol {
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .message-content li { margin-bottom: 0.25rem; }

        .message-content strong { font-weight: 600; color: #fff; }
        .message-content em    { font-style: italic; }

        .message-content a { color: var(--accent); text-decoration: underline; }
        .message-content a:hover { color: var(--accent-hover); }

        .message-content blockquote {
            border-left: 3px solid var(--border);
            padding-left: 1rem;
            color: var(--text-muted);
            margin: 0.5rem 0;
        }

        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 0.75rem;
            font-size: 0.9em;
        }
        .message-content th,
        .message-content td {
            border: 1px solid var(--border);
            padding: 0.4rem 0.75rem;
            text-align: left;
        }
        .message-content th { background: var(--surface); font-weight: 600; }

        /* Inline code */
        .message-content code:not(pre code) {
            background: rgba(110,118,129,0.15);
            padding: 0.18em 0.45em;
            border-radius: 5px;
            border: 1px solid rgba(110,118,129,0.25);
            font-family: 'SFMono-Regular', ui-monospace, Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.76em;
            color: #e6b35a;
            white-space: nowrap;
        }

        /* Fenced code blocks */
        .code-block {
            position: relative;
            margin: 1rem 0;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #383838;
            background: #161b22;
            font-size: 0;   /* collapse whitespace between header and pre */
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #21262d;
            padding: 0.45rem 1rem;
            border-bottom: 1px solid #383838;
            font-size: 0;   /* reset */
        }

        .code-lang {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.72rem;
            font-weight: 500;
            color: #8b949e;
            text-transform: lowercase;
            letter-spacing: 0.03em;
        }

        .copy-btn {
            background: none;
            border: 1px solid transparent;
            color: #8b949e;
            cursor: pointer;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            padding: 0.2rem 0.55rem;
            border-radius: 6px;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            line-height: 1.4;
        }
        .copy-btn:hover {
            color: #c9d1d9;
            border-color: #484f58;
            background: rgba(177,186,196,0.08);
        }
        .copy-btn.copied { color: #3fb950; border-color: #3fb95066; }

        .code-block pre {
            margin: 0;
            padding: 1rem 1.25rem;
            overflow-x: auto;
            background: #161b22 !important;
            font-family: 'SFMono-Regular', ui-monospace, 'Cascadia Code', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.5rem;
            line-height: 1.65;
            tab-size: 4;
        }

        /* Horizontal scrollbar inside code blocks */
        .code-block pre::-webkit-scrollbar { height: 5px; }
        .code-block pre::-webkit-scrollbar-track { background: transparent; }
        .code-block pre::-webkit-scrollbar-thumb { background: #484f58; border-radius: 3px; }
        .code-block pre::-webkit-scrollbar-thumb:hover { background: #6e7681; }

        .code-block pre code {
            background: none !important;
            padding: 0 !important;
            font-size: inherit !important;
            color: inherit !important;
            border-radius: 0 !important;
            font-family: inherit !important;
        }

        /* Thinking indicator */
        .thinking {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            padding: 0.5rem 0;
        }
        .thinking-dots { display: flex; gap: 4px; }
        .thinking-dots span {
            width: 6px; height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30%            { transform: translateY(-4px); opacity: 1; }
        }

        /* Error message */
        .message-row.error-row .message-content {
            color: #fca5a5;
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        /* ── Input area ── */
        .input-area {
            flex-shrink: 0;
            padding: 1rem 1.5rem 1.25rem;
            background: var(--bg);
        }

        .input-wrapper {
            max-width: 860px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: flex-end;
            gap: 0;
            transition: border-color 0.15s;
            padding: 0.5rem 0.5rem 0.5rem 1rem;
        }
        .input-wrapper:focus-within { border-color: var(--text-muted); }

        #messageInput {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.6;
            resize: none;
            max-height: 200px;
            padding: 0.35rem 0;
            overflow-y: auto;
        }
        #messageInput::placeholder { color: var(--text-muted); }
        #messageInput::-webkit-scrollbar { width: 4px; }
        #messageInput::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        #sendBtn {
            width: 36px; height: 36px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, opacity 0.15s;
        }
        #sendBtn:hover   { background: var(--accent-hover); }
        #sendBtn:disabled { background: var(--surface-2); cursor: not-allowed; opacity: 0.5; }

        .send-icon { width: 16px; height: 16px; fill: currentColor; }

        .input-hint {
            max-width: 860px;
            margin: 0.4rem auto 0;
            font-size: 0.72rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* ── Empty state ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 0.75rem;
            color: var(--text-muted);
            padding: 2rem;
            text-align: center;
        }
        .empty-state .big-logo {
            width: 52px; height: 52px;
            background: var(--accent);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; color: #fff; font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .empty-state h2 { font-size: 1.1rem; color: var(--text); font-weight: 600; }
        .empty-state p  { font-size: 0.875rem; max-width: 340px; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logo">M</div>
        <h1>MCP Host</h1>
    </div>
    <div class="status" id="status"></div>
</header>

<div class="tools-bar">
    <span class="tools-label">Tools</span>
    <div id="toolsList" style="display:flex;gap:0.5rem;flex-wrap:nowrap;">
        <span class="tool-chip">Loading…</span>
    </div>
</div>

<div id="messages">
    <div class="empty-state" id="emptyState">
        <div class="big-logo">M</div>
        <h2>MCP Host Chat</h2>
        <p>Ask anything. Tools from connected MCP servers are available automatically.</p>
    </div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <textarea id="messageInput" placeholder="Message MCP Host…" rows="1"></textarea>
        <button id="sendBtn" title="Send (Enter)">
            <svg class="send-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M.5 1.163A1 1 0 0 1 1.97.28l12.868 6.837a1 1 0 0 1 0 1.766L1.969 15.72A1 1 0 0 1 .5 14.836V10.33a1 1 0 0 1 .816-.983L8.5 8 1.316 6.653A1 1 0 0 1 .5 5.67V1.163Z"/>
            </svg>
        </button>
    </div>
    <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
</div>

<script>
    // ── Marked + Highlight.js config ──────────────────────────────────────────
    marked.setOptions({
        breaks: true,
        gfm: true,
        highlight: null   // we handle highlighting ourselves via the renderer
    });

    // Custom renderer: wraps fenced code blocks in our .code-block structure.
    // The copy button reads text from the DOM — no template-literal injection,
    // so Python backslashes, ${…}, backticks etc. can't break the handler.
    const renderer = new marked.Renderer();
    renderer.code = function(code, lang) {
        const hljsReady = typeof hljs !== 'undefined';
        const language = (hljsReady && lang && hljs.getLanguage(lang)) ? lang : (lang || 'plaintext');
        let highlighted;
        try {
            highlighted = hljsReady
                ? hljs.highlight(code, { language: hljsReady && hljs.getLanguage(language) ? language : 'plaintext' }).value
                : escapeHtml(code);
        } catch (_) {
            highlighted = escapeHtml(code);
        }
        return `<div class="code-block">
  <div class="code-header">
    <span class="code-lang">${language}</span>
    <button class="copy-btn" onclick="copyCode(this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copy
    </button>
  </div>
  <pre><code class="hljs language-${language}">${highlighted}</code></pre>
</div>`;
    };
    marked.use({ renderer });

    // Read the raw text directly from the sibling <code> element — avoids any
    // injection issues with template literals and special characters.
    function copyCode(btn) {
        const codeEl = btn.closest('.code-block').querySelector('code');
        const text = codeEl ? codeEl.innerText : '';
        navigator.clipboard.writeText(text).then(() => {
            btn.classList.add('copied');
            btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
            }, 2000);
        });
    }

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const messagesDiv  = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn      = document.getElementById('sendBtn');
    const toolsList    = document.getElementById('toolsList');
    const statusDiv    = document.getElementById('status');
    const emptyState   = document.getElementById('emptyState');

    let ws = null;
    let useWebSocket = true;

    // ── Auto-resize textarea ──────────────────────────────────────────────────
    messageInput.addEventListener('input', () => {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
    });

    // ── Render markdown safely ────────────────────────────────────────────────
    function renderMarkdown(text) {
        try {
            return marked.parse(text);
        } catch (err) {
            console.error('Markdown render error:', err);
            // Fallback: show plain text so the response is never lost
            return `<pre style="white-space:pre-wrap">${escapeHtml(text)}</pre>`;
        }
    }

    // ── Add message to chat ───────────────────────────────────────────────────
    function addMessage(content, role, isError = false) {
        // Hide empty state
        if (emptyState) emptyState.style.display = 'none';

        const row = document.createElement('div');
        row.className = `message-row${isError ? ' error-row' : ''}`;

        const initial = role === 'user' ? 'U' : 'M';
        const avatarClass = isError ? 'error' : role;

        const bodyHTML = role === 'user'
            // User messages: preserve whitespace, no markdown
            ? `<div class="message-content" style="white-space:pre-wrap">${escapeHtml(content)}</div>`
            // Assistant messages: full markdown render
            : `<div class="message-content">${isError ? escapeHtml(content) : renderMarkdown(content)}</div>`;

        row.innerHTML = `
            <div class="avatar ${avatarClass}">${initial}</div>
            <div class="message-body">
                <div class="message-meta">${role === 'user' ? 'You' : 'Assistant'}</div>
                ${bodyHTML}
            </div>`;

        messagesDiv.appendChild(row);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return row;
    }

    function addThinking() {
        if (emptyState) emptyState.style.display = 'none';
        const row = document.createElement('div');
        row.className = 'message-row';
        row.id = 'thinking-indicator';
        row.innerHTML = `
            <div class="avatar assistant">M</div>
            <div class="message-body">
                <div class="message-meta">Assistant</div>
                <div class="thinking">
                    <div class="thinking-dots">
                        <span></span><span></span><span></span>
                    </div>
                    Thinking…
                </div>
            </div>`;
        messagesDiv.appendChild(row);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeThinking() {
        const el = document.getElementById('thinking-indicator');
        if (el) el.remove();
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ── Load tools & status ───────────────────────────────────────────────────
    async function loadTools() {
        try {
            const resp = await fetch('/api/tools');
            const tools = await resp.json();
            if (!tools.length) {
                toolsList.innerHTML = '<span class="tool-chip">No tools</span>';
            } else {
                toolsList.innerHTML = tools.map(t =>
                    `<span class="tool-chip" title="${escapeHtml(t.description)}">${escapeHtml(t.name)}</span>`
                ).join('');
            }
        } catch {
            toolsList.innerHTML = '<span class="tool-chip">Error</span>';
        }
    }

    async function loadStatus() {
        try {
            const resp = await fetch('/api/status');
            const data = await resp.json();
            statusDiv.innerHTML = Object.entries(data.mcp).map(([name, ok]) =>
                `<div class="status-item">
                    <span class="status-dot ${ok ? 'connected' : ''}"></span>
                    ${escapeHtml(name)}
                </div>`
            ).join('');
        } catch { /* silent */ }
    }

    // ── Send via REST ─────────────────────────────────────────────────────────
    async function sendMessageAPI(message) {
        addMessage(message, 'user');
        addThinking();
        sendBtn.disabled = true;

        try {
            const resp = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await resp.json();
            removeThinking();
            if (data.error) {
                addMessage(data.error, 'assistant', true);
            } else {
                addMessage(data.response, 'assistant');
            }
        } catch (err) {
            removeThinking();
            addMessage('Network error: ' + err.message, 'assistant', true);
        } finally {
            sendBtn.disabled = false;
        }
    }

    // ── Send via WebSocket ────────────────────────────────────────────────────
    function sendMessageWS(message) {
        addMessage(message, 'user');
        addThinking();
        sendBtn.disabled = true;
        ws.send(JSON.stringify({ message }));
    }

    function connectWebSocket() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/ws`);

        ws.onmessage = (event) => {
            removeThinking();
            const data = JSON.parse(event.data);
            if (data.error) {
                addMessage(data.error, 'assistant', true);
            } else {
                addMessage(data.response, 'assistant');
            }
            sendBtn.disabled = false;
        };

        ws.onerror = () => { useWebSocket = false; };
        ws.onclose = () => { useWebSocket = false; };
    }

    // ── Main send handler ─────────────────────────────────────────────────────
    function sendMessage() {
        const message = messageInput.value.trim();
        if (!message || sendBtn.disabled) return;

        messageInput.value = '';
        messageInput.style.height = 'auto';

        if (useWebSocket && ws && ws.readyState === WebSocket.OPEN) {
            sendMessageWS(message);
        } else {
            sendMessageAPI(message);
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    loadTools();
    loadStatus();
    connectWebSocket();
    setInterval(loadStatus, 30000);
    messageInput.focus();
</script>
</body>
</html>
